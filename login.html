<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Italia 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --terracotta: #C1440E;
      --terracotta-light: #E8622A;
      --gold: #C9963A;
      --gold-light: #E8B86D;
      --cream: #FAF6EF;
      --dark: #1A1208;
      --dark-mid: #2E2010;
      --text-light: #7A6040;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Jost', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      font-weight: 300;
      overflow: hidden;
      background: var(--dark);
    }

    /* ── Arrière-plan ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(193, 68, 14, 0.22) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201, 150, 58, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(193, 68, 14, 0.12) 0%, transparent 50%),
        linear-gradient(160deg, #1A1208 0%, #2E1A08 40%, #1A1208 100%);
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      mix-blend-mode: overlay;
    }

    /* ── Carte centrale ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 3rem 3rem 2.5rem;
      text-align: center;
      animation: fadeUp 0.9s ease both;
    }

    /* ── Drapeau & titre ── */
    .flag {
      font-size: 2.8rem;
      margin-bottom: 1.2rem;
      display: block;
      animation: fadeUp 0.9s 0.1s ease both;
      opacity: 0;
    }

    .title {
      font-family: var(--font-display);
      font-size: clamp(4rem, 12vw, 6rem);
      font-weight: 300;
      font-style: italic;
      color: var(--cream);
      line-height: 0.9;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      animation: fadeUp 0.9s 0.2s ease both;
      opacity: 0;
    }

    .subtitle {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      margin-bottom: 0.4rem;
      animation: fadeUp 0.9s 0.3s ease both;
      /* opacity: 0; — géré par animation */
    }

    .voyageurs {
      font-family: var(--font-display);
      font-size: 1rem;
      color: rgba(250, 246, 239, 0.5);
      margin-bottom: 2.5rem;
      letter-spacing: 0.03em;
      animation: fadeUp 0.9s 0.35s ease both;
      opacity: 0;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 2.5rem;
      animation: fadeUp 0.9s 0.4s ease both;
      opacity: 0;
    }

    /* ── Formulaire ── */
    .form-group {
      position: relative;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.9s 0.45s ease both;
      opacity: 0;
    }

    .form-label {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
      text-align: left;
    }

    .form-input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(201, 150, 58, 0.25);
      border-radius: 6px;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
      text-align: center;
    }

    .form-input::placeholder {
      color: rgba(250, 246, 239, 0.2);
      letter-spacing: 0.3em;
    }

    .form-input:focus {
      border-color: rgba(201, 150, 58, 0.6);
      background: rgba(255, 255, 255, 0.08);
    }

    .form-input.error {
      border-color: rgba(193, 68, 14, 0.7);
      animation: shake 0.4s ease;
    }

    /* ── Bouton ── */
    .btn {
      width: 100%;
      padding: 0.95rem;
      background: linear-gradient(135deg, var(--terracotta), var(--terracotta-light));
      border: none;
      border-radius: 6px;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(193, 68, 14, 0.3);
      animation: fadeUp 0.9s 0.5s ease both;
      opacity: 0;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(193, 68, 14, 0.4);
    }

    .btn:active { transform: translateY(0); }

    /* ── Message d'erreur ── */
    .error-msg {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--terracotta-light);
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 0.3s;
      min-height: 1.2em;
    }
    .error-msg.visible { opacity: 1; }

    /* ── Note bas ── */
    .note {
      margin-top: 2rem;
      font-size: 0.65rem;
      color: rgba(250, 246, 239, 0.2);
      letter-spacing: 0.1em;
      animation: fadeUp 0.9s 0.6s ease both;
      opacity: 0;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    /* ── Transition de sortie ── */
    .card.success {
      animation: fadeOut 0.6s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-20px); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="card" id="card">
    <span class="flag">🇮🇹</span>
    <h1 class="title">Italia</h1>
    <p class="subtitle">Septembre 2026</p>
    <p class="voyageurs">Pascal · Marie-Ève · Suzie · Patrick</p>
    <div class="divider"></div>

    <div class="form-group">
      <label class="form-label" for="password">Mot de passe</label>
      <input
        type="password"
        id="password"
        class="form-input"
        placeholder="••••••••••"
        autocomplete="current-password"
        autofocus
      />
    </div>

    <button class="btn" id="btn-entrer" onclick="verifier()">Entrer</button>

    <p class="error-msg" id="error-msg">Mot de passe incorrect. Réessaie.</p>

    <p class="note">Site privé · Accès sur invitation</p>
  </div>

  <script>
    // ============================================
    //  CONFIGURATION — Change le mot de passe ici
    // ============================================
    const MOT_DE_PASSE = 'Anakin!';
    const CLE_SESSION  = 'italia2026_auth';
    // ============================================

    // Si déjà authentifié, rediriger directement
    if (sessionStorage.getItem(CLE_SESSION) === 'ok') {
      window.location.replace('index.html');
    }

    function verifier() {
      const input = document.getElementById('password');
      const erreur = document.getElementById('error-msg');
      const card = document.getElementById('card');

      if (input.value === MOT_DE_PASSE) {
        // Succès
        sessionStorage.setItem(CLE_SESSION, 'ok');
        erreur.classList.remove('visible');
        card.classList.add('success');
        setTimeout(() => {
          window.location.replace('index.html');
        }, 600);
      } else {
        // Échec
        input.classList.add('error');
        erreur.classList.add('visible');
        input.value = '';
        setTimeout(() => input.classList.remove('error'), 500);
        input.focus();
      }
    }

    // Permettre la touche Entrée
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifier();
    });
  </script>

</body>
</html>
